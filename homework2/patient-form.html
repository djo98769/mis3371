<html>
    <head>
        <meta charset="utf-8">

        <title>Daniel's Homework 2</title>

        <!-- Load external CSS styles -->
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="header"> 
            <table width="100%">
                <tr>
                    <td width="20%">
                        <img 
                            id="logo" 
                            src="logo.png" 
                            alt="Dan Jo Hospital"
                        >
                    </td>
                    <td align="center" valign="middle"><h1>Dan Jo Hospital</h1></td>
                    <td width="20%" valign="bottom" align="right">Today's date: <span id="today"></span></td>
                </tr>
            </table>
        </div>
        <hr>
<div id="body">    
<form id="patientForm" onreset="removedata1()" action="thankyou.html">
   <table class="form" align="center">
    <tbody>
        
    <tr class="form" align="center">
        <th class="form" colspan="2" align="center">
            <h2>Patient Registration Form</h2>
            <h4>* = required field</h4>
        </th>
    </tr>
       
    <tr class="form">
        <td align="right">
            <label for="firstname">First Name*</label>
        </td>
        <td>
            <input type="text" 
                size="25" 
                maxlength="30" 
                id="firstname" 
                name="firstname" 
                required 
                pattern="[A-Za-z' \-]{1,30}"
                oninput="checkfirstname(); this.setCustomValidity('')"
                title="1 to 30 characters; letters, spaces, hyphens, and apostrophes only." 
                placeholder="First Name"
            ><span id="firstname_text"></span>
            <label for="middleinit">M.I.</label>
            <input type="text" 
                    size="2" 
                    maxlength="1" 
                    id="middleinit" 
                    name="middleinit" 
                    pattern="[A-Za-z]{1}" 
                    title="1 letter only." 
                    placeholder="M.I."
            >
            <label for="lastname">Last Name*</label>
            <input type="text" 
                    size="20" 
                    maxlength="30" 
                    id="lastname" 
                    name="lastname" 
                    required 
                    pattern="[A-Za-z2-5' \-]{1,30}"
                    oninput="checklastname(); this.setCustomValidity('')"
                    title="Minimum 2 characters; letters, numbers 2-5, hyphens, and apostrophes only."  
                    placeholder="Last Name"
            >
            <span id="lastname_text"></span>
        </td>
    </tr>
       
    <tr class="form">
        <td align="right">
            <label for="dob">Date of Birth*</label>
        </td>
        <td>
            <input type="date" 
                    id="dob" 
                    name="dob" 
                    required 
                    title="Birthdays cannot be in the future or more than 120 years ago."
            >
        </td>
    </tr>
       
    <tr class="form">
        <td align="right">
            <label for="ssn">SSN*</label>
        </td>
        <td>
            <input type="password" 
                    id="ssn" 
                    name="ssn" 
                    maxlength="11" 
                    pattern="\d{3}-\d{2}-\d{4}" 
                    title="Please enter SSN in the format: 000-00-0000" 
                    placeholder="123-45-6789" 
                    required
            >
        </td>
    </tr>
       
    <tr  class="form">
        <td align="right">
            <label for="addr1" >Address 1*</label>
        </td>
        <td>
            <input type="text" 
                    size="20" 
                    minlength="4"
                    maxlength="30" 
                    id="addr1" 
                    name="addr1" 
                    required
                    oninvalid="this.setCustomValidity('At least 1 address line Required')"
                    oninput="this.setCustomValidity('')"
                    placeholder="12345 Street Name"
            >
        <span id="addr1_text"></span>
        </td>
    </tr>
       
    <tr  class="form">
        <td align="right">
            <label for="addr2">Address 2 </label>
        </td>
        <td>
            <input type="text" 
                    size="20" 
                    maxlength="30" 
                    id="addr2" 
                    name="addr2" 
                    placeholder="Apt, Suite, Floor, etc."
            >
            <span id="addr2_text"></span>
        </td>
    </tr>
        
<tr class="form">
        <td align="right">
            <label for="city">City*</label>
        </td>
        <td>
            <input type="text" 
                    size="10" 
                    maxlength="30" 
                    id="city" 
                    name="city" 
                    required 
                    oninvalid="this.setCustomValidity('You forgot City')" 
                    oninput="this.setCustomValidity('')" 
                    placeholder="City"
            >
            <label for="state">State*</label>
            <select required 
                    name="state" 
                    id="state" 
                    title="Please select a state from the list">
                    <option value="">--Select a State--</option>
            </select>
            <label for="zip">Zip*</label>
            <input type="text" 
                    id="zip" 
                    name="zip" 
                    class="textsize5" 
                    maxlength="10" 
                    pattern="(\d{5}([\-]\d{4})?)" 
                    title="5-digit zip or 5+4 format (e.g., 77002 or 77002-1234)" 
                    placeholder="00000" 
                    required
            >
            <span id="City_text"></span><span id="State_text"></span>
        </td>
    </tr>
    
    <tr class="form">
        <td align="right">
            <label for="email">Email*</label>
        </td>
        <td>
            <input type="email" 
                    id="email" 
                    name="email" 
                    pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" 
                    title="Please enter a valid email address (e.g., name@domain.tld)" 
                    placeholder="name@domain.tld" 
                    required
            >
        </td>
    </tr>
    <tr class="form">
        <td align="right">
            <label for="phone">Phone Number*</label>
        </td>
        <td>
            <input type="tel" 
                    id="phone" 
                    name="phone" 
                    required 
                    pattern="\d{3}-\d{3}-\d{4}" 
                    title="Please enter phone number in the format: 000-000-0000" 
                    placeholder="000-000-0000">
        </td>
    </tr>
    <tr class="form">
        <td align="right" valign="top">
            <label for="symptoms">Symptoms*</label>
        </td>
        <td>
            <textarea id="symptoms" name="symptoms" rows="3" cols="50" placeholder="Describe your symptoms here" required></textarea>
        </td>
    </tr>
                
    <tr class="form">
        <td align="right" valign="top">
            <label>Medical History<br>(Check all that apply)</label>
        </td>
        <td>
            <input type="checkbox" 
                    name="history" 
                    id="diabetes" 
                    value="diabetes"> 
                    <label for="diabetes">Diabetes</label>
            <input type="checkbox" 
                    name="history" 
                    id="hypertension" 
                    value="hypertension"> 
                    <label for="hypertension">Hypertension</label>
            <input type="checkbox" 
                    name="history" 
                    id="asthma" 
                    value="asthma"> 
                    <label for="asthma">Asthma</label>
            <input type="checkbox" 
                    name="history" 
                    id="flu" 
                    value="flu"> 
                    <label for="flu">Flu</label>
            <input type="checkbox" 
                    name="history" 
                    id="allergies" 
                    value="allergies"> 
                    <label for="allergies">Allergies</label>
        </td>
    </tr>
                
    <tr class="form">
        <td align="right"><label>Gender*</label></td>
        <td>
            <input type="radio" 
                    name="gender"    
                    id="male" 
                    value="male" 
                    required> 
                    <label for="male">Male</label>
            <input type="radio" 
                    name="gender" 
                    id="female" 
                    value="female"> 
                    <label for="female">Female</label>
            <input type="radio" 
                    name="gender" 
                    id="other" 
                    value="other"> 
                    <label for="other">Other</label>
        </td>
    </tr>
                
    <tr class="form">
        <td align="right"><label>Vaccinated for COVID-19?*</label></td>
        <td>
            <input type="radio" 
                    name="vax" 
                    id="vax_yes" 
                    value="yes" 
                    required> 
                    <label for="vax_yes">Yes</label>
            <input type="radio" 
                    name="vax" 
                    id="vax_no" 
                    value="no"> 
                    <label for="vax_no">No</label>
        </td>
    </tr>
                
    <tr class="form">
        <td align="right">
            <label>Insurance?*</label>
        </td>
        <td>
            <input type="radio" 
                    name="insurance" 
                    id="ins_yes" 
                    value="yes" 
                    required>
                    <label for="ins_yes">Yes</label>
            <input type="radio" 
                    name="insurance" 
                    id="ins_no" 
                    value="no">
                    <label for="ins_no">No</label>
        </td>
    </tr>
                
    <tr class="form">
        <td align="right"><label for="health">
            How is your current health?*</label>
        </td>
        <td align="center">
            0&nbsp;&nbsp; <input type="range" 
                      name="health" 
                      id="health" 
                      min="0" 
                      max="10" 
                      step="1" 
                      value="5"
                      oninput="healthNum.innerText = this.value"> &nbsp;&nbsp;10<br>
                Current Value: <span id="healthNum">5</span>
        </td>
    </tr>
    <br><br>            
    <tr class="form">
        <td align="right">
            <label for="userid">User ID*</label>
        </td>
        <td>
            <input type="text" 
                    id="userid" 
                    name="userid" 
                    required 
                    maxlength="30" 
                    pattern="[A-Za-z][A-Za-z0-9\-_]{4,29}"
                    title="5-30 chars; must start with a letter; no spaces or special chars (except _ or -)." 
                    oninput="checkUserID(); this.setCustomValidity('')"
                    placeholder="Desired User ID"
            >
            <span id="userid_text"></span>
        </td>
    </tr>
                
    <tr class="form">
        <td align="right">
            <label for="password">Password*</label>
        </td>
        <td>
            <input type="password" 
                   id="password" 
                   name="password" 
                   pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#%^&*()\-_+=\\\/><.,`~]).{8,30}$"
                   oninput="checkPassword(); this.setCustomValidity('')" 
                   title="8-30 chars, must include: 1 Uppercase, 1 Lowercase, 1 Number, and 1 Special Character (!@#%^&*()-_+=\/><.,`~)" 
                   placeholder="Min 8 Characters"
                >
            <span id="password_text"></span>
        </td>
    </tr>
    <tr class="form">
        <td align="right">
            <label for="confirm_password">Confirm Password*</label>
        </td>
        <td>
            <input type="password" 
                    id="confirm_password" 
                    name="confirm_password" 
                    required  
                    placeholder="Confirm Password"
                    oninput="checkPasswordMatch()"
            >
            <span id="confirm_password_text"></span>
        </td>
    </tr>
                
    <tr class="form">        
        <td colspan="3">
            <br><br><center>
            <input type="button" value="Review" onclick="getdata1()">
            <input type="submit" value="Submit">
            <input type="reset" value="Clear and Start Over">
            </center><br><br>
        </td>
    </tr>
</tbody>
</table>
</form> 
<div id="outputformdata"></div>
        </div>
        <div id="footer">
        <br><br><br><br><hr>
        <table width=100%>
        <tr>
            <td width="30%" align="left" valign="middle">
                Dan Jo Hospital<br>
                PO BOX 18881<br>
                Katy, TX 77494
            </td>
            <td align="center" valign="middle">
                Questions?<br> <a href="contact.html" >Contact Us</a>
            <td width="30%" align="right" valign="middle">
                <a href="https://www.facebook.com"><img src="facebook.png" width="30" alt="Facebook"></a>
                <a href="https://www.instagram.com"><img src="instagram.png" width="30" alt="Instagram"></a>
                <a href="https://www.twitter.com"><img src="twitter.png" width="30" alt="Twitter"></a>
            </td>
        </tr>
        </table>
        </div>
        <!-- Load external JavaScript -->
        <script src="patient-form.js"></script>
        
 <script>
    document.getElementById("today").innerHTML = new Date().toLocaleDateString();
</script>
</body>
